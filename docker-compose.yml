services:

  backend:
    build:
      context: ./backend
    container_name: credit-backend

    environment:
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      API_KEY: ${API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      PLAY_CRYPTO_SECRET: ${PLAY_CRYPTO_SECRET}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      OTEL_SERVICE_NAME: credit-billing
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-producer:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: none
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none

    ports:
      - "9000:9000"

    depends_on:
      mysql:
        condition: service_healthy
      otel-producer:
        condition: service_started

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: credit-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    ports:
      - "3306:3306"

    volumes:
      - mysql-data2:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

    restart: unless-stopped

  kafka:

    image: apache/kafka:4.0.0

    container_name: kafka

    hostname: kafka

    ports:
      - "9092:9092"

    environment:

      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    volumes:
      - kafka-data:/var/lib/kafka

    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse

    ports:
      - "8123:8123"
      - "9001:9000"

    environment:
      CLICKHOUSE_DB: otel_2
      CLICKHOUSE_USER: otel
      CLICKHOUSE_PASSWORD: otel123

    volumes:
      - clickhouse-data2:/var/lib/clickhouse

    healthcheck:
      test: [ "CMD","wget","--spider","http://localhost:8123/ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  otel-producer:

    image: otel/opentelemetry-collector-contrib:0.156.0

    container_name: otel-producer

    command:
      - "--config=/etc/otelcol/config.yaml"

    volumes:
      - ./otel-config-producer.yaml:/etc/otelcol/config.yaml

    ports:
      - "4317:4317"
      - "4318:4318"

    depends_on:
      kafka:
        condition: service_started

  otel-consumer:

    image: otel/opentelemetry-collector-contrib:0.156.0

    container_name: otel-consumer

    command:
      - "--config=/etc/otelcol/config.yaml"

    volumes:
      - ./otel-config-consumer.yaml:/etc/otelcol/config.yaml

    depends_on:

      kafka:
        condition: service_started

      clickhouse:
        condition: service_healthy

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop

    environment:
      KAFKA_BROKERCONNECT: kafka:9092
      JVM_OPTS: "-Xms32M -Xmx64M"
      SERVER_SERVLET_CONTEXTPATH: "/"

    ports:
      - "9010:9000"

    depends_on:
      kafka:
        condition: service_started

    restart: unless-stopped

volumes:
  mysql-data2:
  clickhouse-data2:
  kafka-data: