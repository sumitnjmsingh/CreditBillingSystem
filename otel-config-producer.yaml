receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  kafka:
    brokers:
      - kafka:9092

    metrics:
      topic: otel-metrics
      encoding: otlp_proto

service:

  pipelines:

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [kafka]